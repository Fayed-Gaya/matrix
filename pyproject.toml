[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "B",
    "E",
    "F",
    "I",
    "UP",
]
ignore = [
    "B008",
    "E501",
    "E402",
    "E701",
    "E741",
    "F403",
    "F405",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
